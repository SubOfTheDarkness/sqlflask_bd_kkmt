<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение аккаунта — Suba Market</title>
    <style>   <!--не трогай эти стили (это письмо оно НЕ НАСЛЕДУЕТСЯ)-->
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff7ed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(249, 115, 22, 0.1);
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .logo span {
            background: linear-gradient(135deg, #f97316, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 22px;
            color: #431407;
            margin-bottom: 12px;
        }
        p {
            font-size: 15px;
            color: #9a3412;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #f97316, #ea580c);
            padding: 14px 36px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            color: #ffffff !important;
        }
        .btn:hover {
            filter: brightness(1.05);
        }
        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #a8a29e;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">✨ <span>Suba Market</span></div>
        <div class="icon">📧</div>
        <h1>Подтверждение почты</h1>
        <p>Нажмите кнопку ниже, чтобы подтвердить ваш адрес электронной почты и завершить регистрацию.</p>
        <a href="{{ confirm_url }}" class="btn">Подтвердить почту</a>
        <div class="footer">
            Если вы не регистрировались на Suba Market, просто проигнорируйте это письмо.
        </div>
    </div>
</body>
</html>
