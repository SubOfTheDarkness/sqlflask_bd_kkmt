{% extends "base.html" %}

{% block title %}Сброс пароля — Suba Market{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<div class="auth-form">
  <h2>🔑 Сброс пароля</h2>
  <form method="POST">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="example@mail.ru" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Отправить ссылку</button>
  </form>
  <p style="text-align:center; margin-top:1.5rem;">
    <a href="{{ url_for('auth.auth') }}" style="color:#f97316;">← Вернуться ко входу</a>
  </p>
</div>
{% endblock %}
